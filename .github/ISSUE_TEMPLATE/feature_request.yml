name: Feature request
description: Suggest an improvement or integration.
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What are you trying to accomplish?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - OpenClaw skill
        - doctor / diagnostics
        - OAuth setup
        - docs/templates
        - CI / community health
        - X posting / mutations
        - other
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security / permission impact
      description: New scopes, mutation behavior, storage, callback, or logging implications.
